<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2c3e50">
  <title>バリューズカード</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="app">
    <!-- ホーム -->
    <section id="screen-home" class="screen">
      <header class="hero">
        <h1>バリューズカード</h1>
        <p class="subtitle">自分の価値観と向き合うカードゲーム</p>
      </header>
      <div class="home-actions">
        <button id="btn-show-create" class="btn btn-primary">部屋を作る</button>
        <button id="btn-show-join" class="btn btn-secondary">部屋に参加</button>
      </div>

      <div id="create-form" class="form-block" hidden>
        <label>
          お名前
          <input id="create-name" type="text" maxlength="20" placeholder="例: たろう" autocomplete="off">
        </label>
        <button id="btn-create" class="btn btn-primary">部屋を作成して入室</button>
        <button class="btn btn-link back-to-home">戻る</button>
      </div>

      <div id="join-form" class="form-block" hidden>
        <label>
          部屋コード
          <input id="join-code" type="text" maxlength="6" placeholder="例: ABC123" autocomplete="off" autocapitalize="characters">
        </label>
        <label>
          お名前
          <input id="join-name" type="text" maxlength="20" placeholder="例: たろう" autocomplete="off">
        </label>
        <button id="btn-join" class="btn btn-primary">部屋に参加</button>
        <button class="btn btn-link back-to-home">戻る</button>
      </div>

      <p id="home-error" class="error" hidden></p>
    </section>

    <!-- ロビー -->
    <section id="screen-lobby" class="screen" hidden>
      <header class="lobby-header">
        <p class="room-code-label">部屋コード</p>
        <p id="lobby-code" class="room-code"></p>
        <button id="btn-copy-invite" class="btn btn-link">招待リンクをコピー</button>
      </header>
      <div class="lobby-body">
        <h2>参加者 <span id="lobby-count" class="pill"></span></h2>
        <ul id="lobby-players" class="player-list"></ul>
      </div>
      <div class="lobby-footer">
        <button id="btn-start" class="btn btn-primary" hidden>ゲーム開始</button>
        <p id="lobby-waiting" class="muted" hidden>ホストの開始を待っています…</p>
        <button id="btn-leave-lobby" class="btn btn-link">退出</button>
      </div>
    </section>

    <!-- ゲーム -->
    <section id="screen-game" class="screen" hidden>
      <header class="game-header">
        <div class="turn-info">
          <p id="turn-indicator" class="turn-indicator"></p>
          <p id="phase-hint" class="phase-hint"></p>
        </div>
        <div class="piles">
          <button id="pile-deck" class="pile pile-deck" disabled>
            <span class="pile-label">山札</span>
            <span id="deck-count" class="pile-count">0</span>
          </button>
          <button id="pile-discard" class="pile pile-discard" disabled>
            <span class="pile-label">捨て札</span>
            <span id="discard-top" class="pile-top">–</span>
          </button>
        </div>
      </header>
      <div class="game-body">
        <h2>あなたの手札</h2>
        <ul id="hand" class="hand"></ul>
      </div>
      <div class="game-footer">
        <h3>他プレイヤー</h3>
        <ul id="others" class="others"></ul>
      </div>
    </section>

    <!-- 結果 -->
    <section id="screen-result" class="screen" hidden>
      <header class="result-header">
        <h1>あなたのコアバリュー</h1>
        <p class="muted">スクショして Slack でシェアしよう</p>
      </header>
      <ul id="result-cards" class="result-cards"></ul>
      <div class="result-footer">
        <button id="btn-back-home" class="btn btn-primary">ホームに戻る</button>
      </div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
